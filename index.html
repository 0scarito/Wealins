<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi des contrats Wealins — Chamfeuil Capital</title>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h2 class="sr-only">Suivi des contrats Wealins — checklist de procédure par contrat et par investissement</h2>

<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="header-title">
        <i class="ti ti-file-text" aria-hidden="true"></i>
        Suivi des contrats Wealins
      </div>
      <div class="header-sub">Chamfeuil Capital — validation procédures par contrat</div>
    </div>
    <div class="header-right">
      <span id="save-indicator" class="save-indicator" title="État de sauvegarde">
        <i class="ti ti-cloud-check" aria-hidden="true"></i>
        <span id="save-text">Sauvegardé</span>
      </span>
      <span id="date-lbl" class="date-lbl"></span>
    </div>
  </header>

  <section class="stats">
    <div class="stat">
      <div class="stat-lbl"><i class="ti ti-folders" aria-hidden="true"></i>Contrats</div>
      <div class="stat-val" id="s-c">0</div>
    </div>
    <div class="stat">
      <div class="stat-lbl"><i class="ti ti-coin" aria-hidden="true"></i>Investissements</div>
      <div class="stat-val" id="s-i">0</div>
    </div>
    <div class="stat">
      <div class="stat-lbl"><i class="ti ti-circle-check" aria-hidden="true"></i>Complétés</div>
      <div class="stat-val g" id="s-d">0</div>
    </div>
    <div class="stat">
      <div class="stat-lbl"><i class="ti ti-progress" aria-hidden="true"></i>En cours</div>
      <div class="stat-val a" id="s-p">0</div>
    </div>
    <div class="stat stat-total">
      <div class="stat-lbl"><i class="ti ti-currency-euro" aria-hidden="true"></i>Total investi</div>
      <div class="stat-val" id="s-total">0&nbsp;€</div>
    </div>
  </section>

  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search search-ico" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="Rechercher contrat, client ou ISIN..." oninput="render()" />
    </div>
    <select id="fst" onchange="render()">
      <option value="">Tous statuts</option>
      <option value="done">Complétés</option>
      <option value="in-progress">En cours</option>
      <option value="new">Non démarrés</option>
    </select>
    <select id="sort" onchange="render()" title="Trier">
      <option value="recent">Plus récents</option>
      <option value="name">Par client</option>
      <option value="progress">Par avancement</option>
    </select>
    <div class="toolbar-spacer"></div>
    <button class="btn-icon" onclick="exportData()" title="Exporter les données (sauvegarde JSON)">
      <i class="ti ti-download" aria-hidden="true"></i>
    </button>
    <button class="btn-icon" onclick="document.getElementById('import-file').click()" title="Importer des données">
      <i class="ti ti-upload" aria-hidden="true"></i>
    </button>
    <input type="file" id="import-file" accept="application/json" onchange="importData(event)" style="display:none">
    <button class="btn-new-contrat" onclick="openContratModal()">
      <i class="ti ti-plus" aria-hidden="true"></i>Nouveau contrat
    </button>
  </div>

  <div id="list"></div>
</div>

<div id="modals"></div>
<div id="toasts" class="toasts" aria-live="polite"></div>

<script src="app.js"></script>

</body>
</html>
